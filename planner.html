<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar</title>
  <meta name="description" content="ADHD-friendly weekly calendar with compact category task piles.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css?v=15">
  <link rel="stylesheet" href="life-admin.css?v=15">
  <link rel="stylesheet" href="planner-compact.css?v=15">
  <link rel="stylesheet" href="planner-mock-layout.css?v=15">
</head>
<body class="planner-focused-page compact-calendar-page mock-calendar-page">
  <header class="mock-calendar-header">
    <section class="mock-title-card" aria-label="Calendar title">
      <h1>Calendar</h1>
      <p id="todayDateLabel">today</p>
    </section>

    <nav class="mock-header-actions" aria-label="Calendar navigation">
      <a class="nav-button" href="https://izdrewz.github.io/dash/">Dashboard</a>
      <a class="nav-button" href="update.html">Update/fix</a>
      <a class="nav-button" href="stock.html">Clothes</a>
      <a class="nav-button" href="gifts.html">Gifts</a>
      <button id="prevWeek" class="ghost" type="button" aria-label="Previous week">←</button>
      <button id="todayWeek" type="button">This week</button>
      <button id="nextWeek" class="ghost" type="button" aria-label="Next week">→</button>
    </nav>
  </header>

  <main class="mock-calendar-shell">
    <aside class="panel focus-panel slim-focus mock-timer-panel">
      <div>
        <h2 id="focusTitle">Start new timer</h2>
        <p id="focusText" class="hint">Round timer</p>
      </div>
      <div class="focus-actions mock-timer-actions">
        <button id="startFocus" type="button">Start timer</button>
        <button id="resetFocus" class="ghost" type="button">Reset</button>
        <span id="focusTimer" class="timer">25:00</span>
      </div>
    </aside>

    <section class="mock-calendar-main">
      <section class="panel starter-panel compact-starter-card mock-starter-card">
        <h2>Starter setup</h2>
        <button id="loadStarter" type="button" aria-label="Load starter pack">Load starter pack</button>
      </section>

      <section class="panel pile-panel compact-pile-panel mock-category-panel">
        <div class="compact-pile-title mock-category-title">
          <h2>Categories</h2>
          <span id="unscheduledCount" class="pill">0</span>
        </div>
        <div id="unscheduledList" class="card-list empty-list"></div>
      </section>

      <details id="weeklyAddPanel" class="panel compact-details hidden-add-panel mock-add-panel">
        <summary><span>Add weekly recurring task</span></summary>
        <form id="taskForm" class="task-form compact-task-form">
          <label>Task name<input id="taskName" name="taskName" type="text" placeholder="Exam study, vacuum, journal..." autocomplete="off" required></label>
          <div class="form-row">
            <label>Times per week<input id="taskFrequency" name="taskFrequency" type="number" min="1" max="14" value="3" required></label>
            <label>Minutes<input id="taskDuration" name="taskDuration" type="number" min="5" max="360" step="5" value="45" required></label>
          </div>
          <div class="form-row">
            <label>Type<select id="taskType" name="taskType"><option>Study</option><option>Daily Reset</option><option>Admin</option><option>Cleaning</option><option>Room Setup</option><option>Shopping</option><option>Clothes</option><option>Creative</option><option>Life Planning</option><option>Rest</option></select></label>
            <label>Priority<select id="taskPriority" name="taskPriority"><option>Highest</option><option selected>High</option><option>Medium</option><option>Low</option></select></label>
          </div>
          <div class="form-row">
            <label>Energy<select id="taskEnergy" name="taskEnergy"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></label>
            <label>Category<input id="taskCategory" name="taskCategory" type="text" placeholder="school, room, clothes..."></label>
          </div>
          <label>Tiny first step<input id="taskStep" name="taskStep" type="text" placeholder="Open notes, collect cups, pick 5 items..."></label>
          <label>Details<textarea id="taskDetails" name="taskDetails" rows="2" placeholder="Add context, rules, or what counts as done."></textarea></label>
          <button type="submit">Create weekly task</button>
        </form>
      </details>

      <details id="oneOffAddPanel" class="panel compact-details hidden-add-panel mock-add-panel">
        <summary><span>Add one-off task</span></summary>
        <form id="oneOffForm" class="task-form compact-form compact-task-form">
          <label>One-off task<input id="oneOffName" name="oneOffName" type="text" placeholder="Measure window for mesh..." autocomplete="off" required></label>
          <div class="form-row">
            <label>Minutes<input id="oneOffDuration" name="oneOffDuration" type="number" min="5" max="360" step="5" value="30" required></label>
            <label>Type<select id="oneOffType" name="oneOffType"><option>Admin</option><option>Study</option><option>Daily Reset</option><option>Cleaning</option><option>Room Setup</option><option>Shopping</option><option>Clothes</option><option>Creative</option><option>Life Planning</option><option>Rest</option></select></label>
          </div>
          <div class="form-row">
            <label>Priority<select id="oneOffPriority" name="oneOffPriority"><option>Highest</option><option>High</option><option selected>Medium</option><option>Low</option></select></label>
            <label>Energy<select id="oneOffEnergy" name="oneOffEnergy"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></label>
          </div>
          <label>Tiny first step<input id="oneOffStep" name="oneOffStep" type="text" placeholder="Take photo, open message, grab tape measure..."></label>
          <label>Details<textarea id="oneOffDetails" name="oneOffDetails" rows="2" placeholder="What needs to happen?"></textarea></label>
          <button type="submit">Add one-off card</button>
        </form>
      </details>

      <section class="toolbar panel compact-toolbar calendar-top-toolbar mock-calendar-toolbar">
        <div>
          <p id="weekLabel" class="week-label">Week</p>
          <div id="progressText" class="progress-text">0 scheduled</div>
        </div>
        <div class="toggles">
          <label class="switch"><input id="calmMode" type="checkbox"><span>Calm mode</span></label>
          <label class="switch"><input id="hideDone" type="checkbox"><span>Hide done</span></label>
          <button id="enableReminders" class="ghost" type="button">Enable reminders</button>
          <button id="exportData" class="ghost" type="button">Export</button>
          <label class="file-button">Import<input id="importData" type="file" accept="application/json"></label>
        </div>
      </section>

      <section class="calendar-shell panel contained-calendar compact-calendar-box mock-calendar-box" aria-label="Weekly calendar">
        <div id="calendar" class="calendar"></div>
      </section>

      <details class="panel compact-details compact-rules-panel">
        <summary><span>Weekly task rules</span></summary>
        <div id="taskLibrary" class="rules-list"></div>
      </details>
    </section>
  </main>

  <template id="instanceCardTemplate">
    <article class="task-card" draggable="true">
      <div class="task-main">
        <div>
          <div class="card-title-row"><h3></h3><span class="type-badge"></span></div>
          <p class="task-meta"></p>
        </div>
        <span class="status-dot"></span>
      </div>
      <p class="tiny-step"></p>
      <div class="card-actions">
        <button class="done-button" type="button">Done</button>
        <button class="skip-button ghost" type="button">Skip</button>
        <button class="details-button ghost" type="button">Details</button>
        <button class="unschedule-button ghost" type="button">Unplan</button>
        <button class="remove-button danger" type="button">Remove</button>
      </div>
    </article>
  </template>

  <script src="app.js?v=15"></script>
  <script src="planner-piles.js?v=15"></script>
  <script src="planner-compact.js?v=15"></script>
  <script src="planner-mock-layout.js?v=15"></script>
  <script src="ics-export-safe.js?v=15"></script>
</body>
</html>
